<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eKonoKids - Criação de Meta</title>

    <link rel="stylesheet" href="./css/styles.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-[#ECF4FF] font-['Fredoka'] min-h-screen">

    <div class="flex flex-col md:flex-row min-h-screen">

        <!-- MENU LATERAL -->
        <aside class="w-full md:w-72 bg-white p-6 border-r border-gray-200">

            <h1 class="text-5xl font-bold mb-12 text-center md:text-left">
                <span class="text-[#0C4D06]">eKono</span><span class="text-[#28B543]">Kids</span>
            </h1>

            <nav <nav class="flex flex-col gap-4">

    <!-- CRIAÇÃO -->
    <button
        class="bg-[#D0FED9] border-2 border-[#14A108] rounded-3xl p-4 font-semibold flex items-center gap-3">

        <img
            src="./images/pencil.png"
            alt="Criação"
            class="w-16 h-16 object-contain">

        <span>Criação</span>

    </button>

    <!-- SUAS METAS -->
    <button
        class="bg-[#D8DFE85C] rounded-3xl p-4 font-semibold flex items-center gap-3">

        <img
            src="./images/Icon_goals.png"
            alt="Suas Metas"
            class="w-6 h-6 object-contain">

        <span>Suas Metas</span>

    </button>

    <!-- DETALHES META -->
    <button
        class="bg-[#D8DFE85C] rounded-3xl p-4 font-semibold flex items-center gap-3">

        <img
            src="./images/Icon_details.png"
            alt="Detalhes da Meta"
            class="w-6 h-6 object-contain">

        <span>Detalhes da Meta</span>

    </button>

    <!-- HISTÓRICO -->
    <button
        class="bg-[#D8DFE85C] rounded-3xl p-4 font-semibold flex items-center gap-3">

        <img
            src="./images/treasure_chest.png"
            alt="Histórico"
            class="w-6 h-6 object-contain">

        <span>Histórico da Meta</span>

    </button>

</nav>

        </aside>

        <!-- CONTEÚDO -->
        <main class="flex-1 p-6 md:p-10">

            <!-- PERFIL -->
            <div class="flex justify-center items-center gap-4 mb-10">

                <img
                    src="./images/profile.png"
                    alt="Perfil"
                    class="w-16 h-16 object-contain">

                <input
                    type="text"
                    placeholder="Digite seu nome"
                    class="bg-[#CAF4D2] border-2 border-[#14A108] rounded-full px-8 py-3 w-full max-w-sm text-center focus:outline-none">

            </div>

            <!-- CRIE UMA META -->
            <section
                class="bg-[#B2E7B2]/55 rounded-[25px] p-10 md:p-14 mb-10 text-center"
                style="box-shadow: 0 12px 0 #38B550;">

                <h2 class="text-[42px] md:text-[68px] font-bold text-[#0C4D06]">
                    Crie uma meta!
                </h2>

            </section>

            <!-- CAMPOS - PREEENCHER -->
            <section class="grid md:grid-cols-2 gap-8 mb-10">

                <!-- NOME -->
                <div
                    class="bg-[#9DF2AE] rounded-[72px] p-8 min-h-[220px]"
                    style="box-shadow: 0 12px 0 #38B550;">

                    <h3 class="text-4xl font-bold text-center text-black mb-10">
                        Nome da Meta
                    </h3>

                    <input
                        type="text"
                        placeholder="Digite o nome da meta"
                        class="w-full bg-transparent border-b-2 border-black text-center p-2 focus:outline-none">

                </div>

                <!-- VALOR -->
                <div
                    class="bg-[#9DF2AE] rounded-[72px] p-8 min-h-[220px]"
                    style="box-shadow: 0 12px 0 #38B550;">

                    <h3 class="text-4xl font-bold text-center text-black mb-10">
                        Valor da Meta
                    </h3>

                    <div class="flex justify-center items-center gap-3">

                        <span class="font-bold text-3xl">
                            R$:
                        </span>

                        <input
                            type="number"
                            placeholder="Digite o valor"
                            class="bg-transparent border-b-2 border-black text-center p-2 focus:outline-none">

                    </div>

                </div>

            </section>

            <!-- RESUMO -->
            <section
                class="bg-[#B2E7B2]/55 rounded-[25px] p-8"
                style="box-shadow: 0 12px 0 #38B550;">

                <h3 class="text-5xl font-bold text-center text-[#0C4D06] mb-8">
                    Resumo da Meta
                </h3>

                <div class="flex justify-center">

                    <img
                        src="./images/puzzles.png"
                        alt="Resumo da Meta"
                        class="w-full max-w-[550px] object-contain">

                </div>

            </section>

            <!-- BOTÃO -->
            <div class="flex justify-center mt-12 mb-10">

                <button
                    class="bg-green-800 text-black text-xl font-bold px-16 py-4 rounded-full hover:translate-y-[2px] transition"
                    style="box-shadow: 0 8px 0 #38B550;">

                    Salvar Meta!

                </button>

            </div>

        </main>

    </div>

</body>

</html>
